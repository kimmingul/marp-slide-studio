name: publish-gallery

# Build the theme gallery and deploy to GitHub Pages.
# Runs when theme CSS / registry / sampler / gallery template changes,
# or manually via workflow_dispatch.

on:
  push:
    branches: [main]
    paths:
      - "assets/design-systems/**"
      - "assets/layouts/**"
      - "assets/theme-foundation.css"
      - "assets/typography/**"
      - "examples/gallery-sampler/**"
      - "scripts/gallery/**"
      - "scripts/build-gallery.mjs"
      - ".github/workflows/publish-gallery.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build gallery
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: |
          set -euo pipefail
          node scripts/build-gallery.mjs --out ./_site
          echo ""
          echo "Built artifacts:"
          ls -la ./_site
          du -sh ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
